services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_PATH: ${DATABASE_PATH:-data/elephant_agent.db}
      SOLIDUS_LOCAL_PATH: ${SOLIDUS_LOCAL_PATH:-/opt/solidus/solidus}
    volumes:
      - backend_data:/app/data
      - solidus_repo:/opt/solidus
    expose:
      - "8000"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    env_file:
      - .env
    environment:
      BACKEND_API_URL: ${BACKEND_API_URL:-http://backend:8000}
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:3000"
    restart: unless-stopped

volumes:
  backend_data:
  solidus_repo:
